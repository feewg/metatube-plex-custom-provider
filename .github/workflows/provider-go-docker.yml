name: Build provider-go Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "provider-go/**"
      - ".github/workflows/provider-go-docker.yml"
  pull_request:
    branches:
      - main
    paths:
      - "provider-go/**"
      - ".github/workflows/provider-go-docker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: provider-go-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-go
  SDK_REPOSITORY: https://github.com/metatube-community/metatube-sdk-go.git

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve latest MetaTube SDK revision
        id: sdk
        shell: bash
        run: |
          revision="$(git ls-remote "${SDK_REPOSITORY}" refs/heads/main | awk '{print $1}')"
          if [[ -z "${revision}" ]]; then
            echo "Unable to resolve the MetaTube SDK main branch" >&2
            exit 1
          fi
          echo "revision=${revision}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ./provider-go
          file: ./provider-go/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            METATUBE_SDK_VERSION=${{ steps.sdk.outputs.revision }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: |
            ${{ steps.metadata.outputs.labels }}
            io.metatube.sdk.revision=${{ steps.sdk.outputs.revision }}
          cache-from: type=gha,scope=provider-go
          cache-to: type=gha,mode=max,scope=provider-go
