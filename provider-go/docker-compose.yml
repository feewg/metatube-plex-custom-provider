services:
  provider-go:
    image: ghcr.io/feewg/metatube-plex-custom-provider-go:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      METATUBE_AUTH_TOKEN: replace-with-a-long-random-token
    volumes:
      - metatube-provider-go-data:/data

volumes:
  metatube-provider-go-data:
